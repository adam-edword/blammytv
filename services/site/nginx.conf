server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # --- Compression ---------------------------------------------------
    # Skip images/fonts — they're already compressed; gzip only text.
    # (text/html is always gzipped when gzip is on.)
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # --- Health check for Coolify --------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # --- HTML: always revalidate so edits go live on the next load -----
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # --- Fonts & images: cache an hour ---------------------------------
    # Filenames are stable (not content-hashed), so keep the window short
    # enough that a swapped-in image shows up quickly.
    location /assets/ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
