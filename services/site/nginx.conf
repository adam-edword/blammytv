server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # --- Compression ---------------------------------------------------
    # Skip images/fonts — they're already compressed; gzip only text.
    # (text/html is always gzipped when gzip is on.)
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # --- Health check for Coolify --------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # --- HTML: always revalidate so edits go live on the next load -----
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # --- Fonts & images: revalidate every time -------------------------
    # Filenames are stable (not content-hashed), so a max-age would keep
    # serving a swapped-in image's stale copy for the whole window. Instead
    # "no-cache" lets the browser store it but forces an ETag revalidation
    # before reuse: unchanged files get a cheap 304, a swapped-in file gets
    # a 200 with the new bytes immediately on the next load. nginx's
    # auto-generated ETag (mtime+size) drives it — a redeploy changes mtime.
    location /assets/ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
