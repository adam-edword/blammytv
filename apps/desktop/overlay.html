<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BlammyTV Theater Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        /* Fully transparent so the native mpv video shows through. */
        background: transparent;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        color: #fff;
        user-select: none;
      }
      /* Top-left proof banner — if you can see this OVER the video, the
         transparent-overlay-over-native-mpv approach works. */
      .banner {
        position: fixed;
        top: 18px;
        left: 18px;
        padding: 10px 16px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.6);
        font-weight: 600;
        font-size: 14px;
      }
      .bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 22px 28px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.75), transparent);
      }
      button {
        appearance: none;
        border: none;
        border-radius: 8px;
        padding: 12px 18px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: rgba(255, 255, 255, 0.16);
        cursor: pointer;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.28);
      }
      .spacer {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="banner">BlammyTV — native theater overlay ✅</div>
    <div class="bar">
      <button id="play">Pause</button>
      <div class="spacer"></div>
      <button id="close">Close ✕</button>
    </div>
    <script>
      let paused = false;
      const playBtn = document.getElementById("play");
      playBtn.addEventListener("click", () => {
        paused = !paused;
        window.overlayApi.setPause(paused);
        playBtn.textContent = paused ? "Play" : "Pause";
      });
      document
        .getElementById("close")
        .addEventListener("click", () => window.overlayApi.close());
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") window.overlayApi.close();
      });
    </script>
  </body>
</html>
