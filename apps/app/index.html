<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Android (TV): the WebView hands us a ~960px CSS viewport (device-width at
      // dpr 2) AND ignores a `width=` viewport override, so the ~1280px+ desktop
      // layout looks oversized. Scale the whole page down with CSS zoom instead —
      // it re-lays-out the page as if it had `target` logical px of width. Desktop
      // (WebView2) never matches this branch. Tunable via localStorage
      // 'blammytv.tvViewportWidth' (target logical width; default 1440) — set it +
      // reload to try sizes; bigger target = smaller UI.
      if (/Android/.test(navigator.userAgent)) {
        document.documentElement.classList.add("is-android");
        var target = parseInt(
          localStorage.getItem("blammytv.tvViewportWidth") || "1440",
          10,
        );
        document.documentElement.style.zoom = String(screen.width / target);
      }
    </script>
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>BlammyTV</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
