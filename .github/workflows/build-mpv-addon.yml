name: Build mpv addon (Windows)

# Manual: builds the native libmpv addon on a Windows runner (which has MSVC +
# Python) and uploads mpv_addon.node + libmpv-2.dll, so you don't need a local
# C++ toolchain. Download the artifact -> drop both files into
# apps/desktop/native/mpv/build/Release/.
on:
  workflow_dispatch:
  push:
    branches: [claude/next, main]
    paths:
      - "apps/desktop/native/**"
      - ".github/workflows/build-mpv-addon.yml"

jobs:
  build:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Set up MSVC (lib.exe, cl.exe)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve Electron version
        id: electron
        shell: pwsh
        run: |
          $v = pnpm --filter @blammytv/desktop exec node -e "process.stdout.write(require('electron/package.json').version)"
          if (-not $v) { throw "could not resolve electron version" }
          Write-Host "Electron $v"
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Fetch + stage libmpv dev (headers, import lib, dll)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $urls = gh api repos/zhongfly/mpv-winbuild/releases/latest --jq '.assets[].browser_download_url'
          $url = $urls | Where-Object { $_ -match 'mpv-dev-x86_64-\d' -and $_ -notmatch '-v3-' } | Select-Object -First 1
          if (-not $url) { $url = $urls | Where-Object { $_ -match 'mpv-dev-x86_64' } | Select-Object -First 1 }
          if (-not $url) { throw "no mpv-dev-x86_64 asset in latest release" }
          Write-Host "libmpv dev: $url"
          Invoke-WebRequest -Uri $url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev | Out-Null

          $def = Get-ChildItem -Recurse mpv-dev -Filter mpv.def | Select-Object -First 1
          $dll = Get-ChildItem -Recurse mpv-dev -Filter libmpv-2.dll | Select-Object -First 1
          $inc = Get-ChildItem -Recurse mpv-dev -Directory |
            Where-Object { $_.Name -eq 'mpv' -and (Test-Path (Join-Path $_.FullName 'client.h')) } |
            Select-Object -First 1
          if (-not $def -or -not $dll -or -not $inc) { throw "mpv.def / libmpv-2.dll / include\mpv not found in package" }

          $vendor = "apps/desktop/native/mpv/vendor"
          New-Item -ItemType Directory -Force "$vendor/include", "$vendor/lib" | Out-Null
          Copy-Item -Recurse -Force $inc.FullName "$vendor/include/mpv"
          lib /def:"$($def.FullName)" /out:"$vendor/lib/mpv.lib" /machine:x64
          Copy-Item -Force $dll.FullName "$vendor/libmpv-2.dll"

      - name: Build the addon
        shell: pwsh
        working-directory: apps/desktop/native/mpv
        run: |
          npm install
          npx node-gyp rebuild --dist-url=https://electronjs.org/headers --target=${{ steps.electron.outputs.version }} --arch=x64

      - name: Stage runtime dll next to the addon
        shell: pwsh
        run: |
          Copy-Item -Force apps/desktop/native/mpv/vendor/libmpv-2.dll apps/desktop/native/mpv/build/Release/

      - uses: actions/upload-artifact@v4
        with:
          name: mpv-addon-win-x64-electron${{ steps.electron.outputs.version }}
          path: |
            apps/desktop/native/mpv/build/Release/mpv_addon.node
            apps/desktop/native/mpv/build/Release/libmpv-2.dll
          if-no-files-found: error
